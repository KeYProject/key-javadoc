
<!DOCTYPE html>
<html lang="en">
	<head>
		<title>KeY Javadoc</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" integrity="sha384-KA6wR/X5RY4zFAHpv/CnoG2UW1uogYfdnP67Uv7eULvTveboZJg0qUpmJZb5VqzN" crossorigin="anonymous">

        <style>
         html, body {
             padding:0;
             margin:0;
             width:100%;
             height:100%;
         }
         nav {
             height:2em;
             background:black; color:white; padding:1ex; margin:0;
             a {
                 color:white;
             }
         }

         .fill {
             width:100%;
             height: calc(100% - 2em);
             iframe {
                 width:100%;
                 height: calc(100% - 2em);
             }
         }
        </style>
	</head>

	<body>
	    <nav style="">
		    <a href="/" class="navbar-brand">
			    <i class="fas fa-home"></i>
		    </a>

            <select id="version">
                <option>KeY-3.0.0-JP-rc</option>                
                <option>KeY-2.6.3</option>
                <option>KeY-2.6.2</option>
                <option>KeY-2.6.1</option>
                <option>KeY-2.6.0</option>
            </select>

			<a class='nav-link' href="https://key-project.org">
				<i class="fa fa-home" aria-hidden="true"></i> Homepage
			</a>
	    </nav>

	    <div class="fill">
            <iframe class="content" src="KeY-3.0.0-JP-rc" onload="iframeLoad" id="docContainer"></iframe>
	    </div>
		
		<script>
         let docContainer = document.getElementById("docContainer");

         // this is called every time the iframe is loaded. it could be trigger by a user click, or a browser back button
         function iframeLoad() {
             var url = docContainer.contentWindow.location.href;
             // javascript replace only work to the first occurrence, so it's ok even /static is part of the url
             var docUrl = url.replace("/static", "/doc");
             
             if (this.isLatest) {
                 docUrl = docUrl.replace("/" + this.versionId, "/latest");
             }

             console.log("pushing state to history: " + docUrl + " history size = " + window.history.length);

             // use 'window.history.replaceState' here instead of 'window.location.href = url' so that the page won't be refreshed again
             // https://github.com/maxcellent/javadoc.io/issues/52
             // pushState is NOT used here. Because iframe event will be
             // remembered by browser already, which means with pushState history
             // will be duplicated.
             window.history.replaceState("", "", docUrl);
         }

         function mounted() {
             document.getElementById('version').select(function(e) {
                 docContainer.src = this.value;
             });

             // pass the hashTag from iframe back to the parent
             // we have to use this primitive approach because vuejs cannot bind with hashchange event
             var iframeWindow = docContainer.contentWindow;
             iframeWindow.addEventListener('hashchange', function () {
                 var url = window.location.pathname + iframeWindow.location.hash;
                 console.log("pushing hash state to history: " + url);
                 window.history.pushState(null, null, url);
             });

             // pass on hashTag to iframe, which is not passed on to the backend
             var hash = window.location.hash;
             if (hash) {
                 docContaineriframe.attr("src", iframe.attr('src') + hash);
             }
         };
        </script>
	</body>
</html>
